name: test-interactive-image
image: mosaicml/dle:nightly-latest
scheduling:
  priority: low
  resumable: false
  preemptible: true
  max_duration: 1
compute:
  gpus: 16
  cluster: r5z2p2
env_variables:
  WANDB_API_KEY: 06d47912179062d79bdbe20e333a8a6a00fdcef2
command: |-
  # sparse-checkout universe
  git clone https://github.com/XiaohanZhangCMU/Tiny-RL.git
  cd Tiny-RL
  git checkout xiaohan/rdma-weight-sync
  pip install uv 
  uv sync 
  TORCH_COMPILE=1 uv run src/launch.py --config src/config.yaml

