name: tinyrl-weight-sync-test-multinode-rdma
image: mosaicml/dle:nightly-latest
scheduling:
  priority: low
  resumable: false
  preemptible: true
  max_duration: 1
compute:
  gpus: 16
  cluster: r5z2p1
env_variables:
  RDMA_BACKEND: libfabric
  RDMA_PORT: "6000"
  RDMA_CTRL_PORT: "6001"
  LIBFABRIC_PROVIDER: ""
command: |-
  set -euo pipefail
  if [ -z "${MASTER_ADDR:-}" ]; then echo "MASTER_ADDR is required"; exit 1; fi
  apt-get update
  apt-get install -y --no-install-recommends libfabric1 libfabric-dev
  git clone -b xiaohan/rdma-weight-sync https://github.com/XiaohanZhangCMU/Tiny-RL.git
  cd Tiny-RL
  pip install uv
  uv sync
  uv run python test_multinode_rdma.py
